# ── HTTP bootstrap / challenge mode (first-time SSL on production) ───────────

upstream titan_upstream {
    server app:8000;
    keepalive 64;
}

server {
    listen      80;
    server_name titan.antmind.ai localhost _;
    client_max_body_size 18m;

    server_tokens off;

    add_header X-Frame-Options        DENY                             always;
    add_header X-Content-Type-Options nosniff                          always;
    add_header X-XSS-Protection       "1; mode=block"                 always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header X-Request-ID           $request_id                      always;

    # Required for Let's Encrypt HTTP-01 challenge during first-time SSL setup.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Container healthcheck endpoint.
    location = /nginx-health {
        access_log off;
        return 200 "ok\n";
    }

    # Health endpoints — no rate limiting
    location = /api/v1/health {
        proxy_pass            http://titan_upstream;
        proxy_http_version    1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /health {
        proxy_pass            http://titan_upstream;
        proxy_http_version    1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # All other requests — rate limited
    location / {
        limit_req  zone=api burst=500 nodelay;
        limit_conn addr 200;

        proxy_pass              http://titan_upstream;
        proxy_http_version      1.1;
        proxy_set_header        Upgrade           $http_upgrade;
        proxy_set_header        Connection        "upgrade";
        proxy_set_header        Host              $host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
        proxy_set_header        X-Request-ID      $request_id;
        proxy_read_timeout      120s;
        proxy_connect_timeout   10s;
        proxy_send_timeout      120s;
        proxy_buffering         on;
        proxy_buffer_size       128k;
        proxy_buffers           4 256k;
        proxy_busy_buffers_size 256k;
    }
}
