# ── Production — titan.antmind.ai — HTTPS with Let's Encrypt ──────────────────

upstream titan_upstream {
    server app:8000;
    keepalive 64;
}

# HTTP: certbot challenges + redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name titan.antmind.ai;
    client_max_body_size 18m;

    server_tokens off;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Container healthcheck endpoint; must stay on plain HTTP and avoid redirects.
    location = /nginx-health {
        access_log off;
        return 200 "ok\n";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443      ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name titan.antmind.ai;
    client_max_body_size 18m;

    server_tokens off;

    ssl_certificate     /etc/letsencrypt/live/titan.antmind.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/titan.antmind.ai/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/titan.antmind.ai/chain.pem;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:TLS:50m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;
    ssl_buffer_size           4k;
    ssl_stapling              on;
    ssl_stapling_verify       on;
    resolver                  1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout          5s;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options            DENY                                           always;
    add_header X-Content-Type-Options     nosniff                                        always;
    add_header X-XSS-Protection           "1; mode=block"                                always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"              always;
    add_header Content-Security-Policy    "default-src 'self' https:; script-src 'self' https: 'unsafe-inline' 'unsafe-eval'; style-src 'self' https: 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data: https:; connect-src 'self' https:;" always;
    add_header Permissions-Policy         "interest-cohort=()"                           always;
    add_header X-Request-ID               $request_id                                    always;

    # Health endpoints — no rate limiting
    location = /api/v1/health {
        proxy_pass            http://titan_upstream;
        proxy_http_version    1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /health {
        proxy_pass            http://titan_upstream;
        proxy_http_version    1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # All other requests — rate limited
    location / {
        limit_req  zone=api burst=500 nodelay;
        limit_conn addr 200;

        proxy_pass              http://titan_upstream;
        proxy_http_version      1.1;
        proxy_set_header        Upgrade           $http_upgrade;
        proxy_set_header        Connection        "upgrade";
        proxy_set_header        Host              $host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
        proxy_set_header        X-Request-ID      $request_id;
        proxy_read_timeout      120s;
        proxy_connect_timeout   10s;
        proxy_send_timeout      120s;
        proxy_buffering         on;
        proxy_buffer_size       128k;
        proxy_buffers           4 256k;
        proxy_busy_buffers_size 256k;
    }
}
