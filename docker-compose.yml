name: titan

services:
  # ── PostgreSQL 16 + pgvector ───────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: titan_postgres
    profiles: ["dev", "prod"]
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-titan}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB: ${DB_NAME:-titan}
      PGDATA: /var/lib/postgresql/data/pgdata
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    # Tuned for 4 CPU / 16 GB RAM (KVM4 on Hostinger)
    command: >
      postgres
        -c max_connections=200
        -c shared_buffers=4GB
        -c effective_cache_size=12GB
        -c maintenance_work_mem=1GB
        -c checkpoint_completion_target=0.9
        -c wal_buffers=64MB
        -c default_statistics_target=100
        -c random_page_cost=1.1
        -c effective_io_concurrency=200
        -c work_mem=20MB
        -c min_wal_size=1GB
        -c max_wal_size=4GB
        -c max_worker_processes=4
        -c max_parallel_workers_per_gather=2
        -c max_parallel_workers=4
        -c max_parallel_maintenance_workers=2
        -c log_min_duration_statement=1000
        -c log_lock_waits=on
        -c deadlock_timeout=1s
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - titan_net
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U ${DB_USER:-titan} -d ${DB_NAME:-titan}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 6G

  # ── Redis 7 ───────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: titan_redis
    profiles: ["dev", "prod"]
    restart: unless-stopped
    environment:
      REDISCLI_AUTH: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    command: >
      redis-server
        --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
        --appendonly yes
        --appendfsync everysec
        --maxmemory 2gb
        --maxmemory-policy allkeys-lru
        --tcp-backlog 511
        --tcp-keepalive 300
        --loglevel notice
        --save 900 1
        --save 300 10
        --save 60 10000
        --protected-mode yes
        --rename-command FLUSHALL ""
        --rename-command FLUSHDB ""
        --rename-command DEBUG ""
        --rename-command CONFIG ""
    volumes:
      - redis_data:/data
    networks:
      - titan_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2G

  # ── FastAPI Application ────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: titan-api:latest
    container_name: titan_app
    profiles: ["dev", "prod"]
    restart: unless-stopped
    environment:
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-titan}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      DB_NAME: ${DB_NAME:-titan}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-20}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-40}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      REDIS_DB: ${REDIS_DB:-0}
      ARQ_QUEUE_NAME: ${ARQ_QUEUE_NAME:-titan:queue}
      ARQ_MAX_JOBS: ${ARQ_MAX_JOBS:-100}
      ARQ_JOB_TIMEOUT_SECONDS: ${ARQ_JOB_TIMEOUT_SECONDS:-1800}
      ARQ_KEEP_RESULT_SECONDS: ${ARQ_KEEP_RESULT_SECONDS:-3600}
      WORKERS_COUNT: ${WORKERS_COUNT:-0}
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-false}
      ENABLE_CREDIT_SELF_TOPUP: ${ENABLE_CREDIT_SELF_TOPUP:-false}
      CREDIT_SELF_TOPUP_AMOUNT: ${CREDIT_SELF_TOPUP_AMOUNT:-3}
      APP_ENVIRONMENT: ${APP_ENVIRONMENT:-production}
      FREE_LIFETIME_CREDITS: ${FREE_LIFETIME_CREDITS:-3}
      CREDITS_INTERNAL_API_KEY: ${CREDITS_INTERNAL_API_KEY:-}
      DESIGN_UPLOAD_DIR: ${DESIGN_UPLOAD_DIR:-/tmp/titan/design-inputs}
      DESIGN_OUTPUT_DIR: ${DESIGN_OUTPUT_DIR:-/tmp/titan/design-outputs}
      DESIGN_GENERATION_PROVIDER: ${DESIGN_GENERATION_PROVIDER:-fal}
      FAL_KEY: ${FAL_KEY:-}
      FAL_TIMEOUT_MINUTES: ${FAL_TIMEOUT_MINUTES:-20}
      FAL_DESIGN_MODEL: ${FAL_DESIGN_MODEL:-fal-ai/bytedance/seedream/v4.5/edit}
      FAL_DESIGN_ASPECT_RATIO: ${FAL_DESIGN_ASPECT_RATIO:-1:1}
      FAL_DESIGN_RESOLUTION: ${FAL_DESIGN_RESOLUTION:-1K}
      FAL_DESIGN_OUTPUT_FORMAT: ${FAL_DESIGN_OUTPUT_FORMAT:-png}
      ENABLE_HIGGSFIELD_BACKEND: ${ENABLE_HIGGSFIELD_BACKEND:-false}
      HIGGSFIELD_TIMEOUT_MINUTES: ${HIGGSFIELD_TIMEOUT_MINUTES:-20}
      HIGGSFIELD_BIN: ${HIGGSFIELD_BIN:-higgsfield}
      HIGGSFIELD_DESIGN_MODEL: ${HIGGSFIELD_DESIGN_MODEL:-seedream_v4_5}
      HIGGSFIELD_DESIGN_QUALITY: ${HIGGSFIELD_DESIGN_QUALITY:-high}
      HIGGSFIELD_DESIGN_ASPECT_RATIO: ${HIGGSFIELD_DESIGN_ASPECT_RATIO:-1:1}
      R2_ENDPOINT_URL: ${R2_ENDPOINT_URL:-}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL:-}
      R2_PRESIGNED_URL_EXPIRY: ${R2_PRESIGNED_URL_EXPIRY:-3600}
    volumes:
      - ./logs:/app/logs
      - ${DESIGN_UPLOAD_DIR:-/tmp/titan/design-inputs}:${DESIGN_UPLOAD_DIR:-/tmp/titan/design-inputs}
      - ${DESIGN_OUTPUT_DIR:-/tmp/titan/design-outputs}:${DESIGN_OUTPUT_DIR:-/tmp/titan/design-outputs}
      - higgsfield_config:/app/.config
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - titan_net
    deploy:
      resources:
        limits:
          cpus: "3.0"
          memory: 6G

  # ── ARQ Worker (background jobs) ───────────────────────────────────────────
  arq-worker:
    image: titan-api:latest
    container_name: titan_arq_worker
    profiles: ["dev", "prod"]
    restart: unless-stopped
    command: ["arq", "app.workers.worker.WorkerSettings"]
    healthcheck:
      disable: true
    environment:
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-titan}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      DB_NAME: ${DB_NAME:-titan}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-20}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-40}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      REDIS_DB: ${REDIS_DB:-0}
      ARQ_QUEUE_NAME: ${ARQ_QUEUE_NAME:-titan:queue}
      ARQ_MAX_JOBS: ${ARQ_MAX_JOBS:-100}
      ARQ_JOB_TIMEOUT_SECONDS: ${ARQ_JOB_TIMEOUT_SECONDS:-1800}
      ARQ_KEEP_RESULT_SECONDS: ${ARQ_KEEP_RESULT_SECONDS:-3600}
      DESIGN_UPLOAD_DIR: ${DESIGN_UPLOAD_DIR:-/tmp/titan/design-inputs}
      DESIGN_OUTPUT_DIR: ${DESIGN_OUTPUT_DIR:-/tmp/titan/design-outputs}
      DESIGN_GENERATION_PROVIDER: ${DESIGN_GENERATION_PROVIDER:-fal}
      FAL_KEY: ${FAL_KEY:-}
      FAL_TIMEOUT_MINUTES: ${FAL_TIMEOUT_MINUTES:-20}
      FAL_DESIGN_MODEL: ${FAL_DESIGN_MODEL:-fal-ai/bytedance/seedream/v4.5/edit}
      FAL_DESIGN_ASPECT_RATIO: ${FAL_DESIGN_ASPECT_RATIO:-1:1}
      FAL_DESIGN_RESOLUTION: ${FAL_DESIGN_RESOLUTION:-1K}
      FAL_DESIGN_OUTPUT_FORMAT: ${FAL_DESIGN_OUTPUT_FORMAT:-png}
      ENABLE_HIGGSFIELD_BACKEND: ${ENABLE_HIGGSFIELD_BACKEND:-false}
      HIGGSFIELD_TIMEOUT_MINUTES: ${HIGGSFIELD_TIMEOUT_MINUTES:-20}
      HIGGSFIELD_BIN: ${HIGGSFIELD_BIN:-higgsfield}
      HIGGSFIELD_DESIGN_MODEL: ${HIGGSFIELD_DESIGN_MODEL:-seedream_v4_5}
      HIGGSFIELD_DESIGN_QUALITY: ${HIGGSFIELD_DESIGN_QUALITY:-high}
      HIGGSFIELD_DESIGN_ASPECT_RATIO: ${HIGGSFIELD_DESIGN_ASPECT_RATIO:-1:1}
      R2_ENDPOINT_URL: ${R2_ENDPOINT_URL:-}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL:-}
      R2_PRESIGNED_URL_EXPIRY: ${R2_PRESIGNED_URL_EXPIRY:-3600}
    volumes:
      - ./logs:/app/logs
      - ${DESIGN_UPLOAD_DIR:-/tmp/titan/design-inputs}:${DESIGN_UPLOAD_DIR:-/tmp/titan/design-inputs}
      - ${DESIGN_OUTPUT_DIR:-/tmp/titan/design-outputs}:${DESIGN_OUTPUT_DIR:-/tmp/titan/design-outputs}
      - higgsfield_config:/app/.config
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      app:
        condition: service_started
    networks:
      - titan_net
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2G

  # ── Nginx ─────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: titan_nginx
    profiles: ["prod"]
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d/${NGINX_CONF:-titan.conf}:/etc/nginx/conf.d/default.conf:ro
      - ./logs/nginx:/var/log/nginx
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - app
    networks:
      - titan_net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://localhost/nginx-health >/dev/null || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  # ── Certbot — auto-renews Let's Encrypt certificate ───────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: titan_certbot
    profiles: ["prod"]
    restart: unless-stopped
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: >
      /bin/sh -c "trap exit TERM;
        while :; do
          certbot renew --quiet;
          sleep 12h & wait $${!};
        done"

volumes:
  postgres_data:
  redis_data:
  certbot_certs:
  certbot_www:
  higgsfield_config:

networks:
  titan_net:
    driver: bridge
